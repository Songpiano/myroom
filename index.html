<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Antigravity Flower Calendar</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
</head>
<body>

<div class="calendar-container">
    <div id="flowerBg" class="flower-bg"></div>
    
    <div class="header">
        <div class="month-year">
            <h2 id="monthDisplay">April</h2>
            <div class="year-selector">
                <button onclick="changeYear(-1)">◀</button>
                <span id="yearDisplay">2026</span>
                <button onclick="changeYear(1)">▶</button>
            </div>
        </div>
        <div class="nav-btns">
            <button onclick="changeMonth(-1)">◀ 이전달</button>
            <button onclick="changeMonth(1)">다음달 ▶</button>
        </div>
    </div>

    <div class="calendar-grid" id="calendarGrid">
    </div>

    <div class="flower-info">
        <div class="flower-tag" id="flowerName">🌸 벚꽃 (Cherry Blossom)</div>
        <div id="flowerMeaning">"아름다운 정신, 정신적 사랑"</div>
    </div>
</div>

<!-- 일정 추가 기능 모달 -->
<div id="eventModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h3 id="modalDate">날짜</h3>
        <textarea id="eventInput" placeholder="이곳에 일정을 기록하세요..."></textarea>
        <button onclick="saveEvent()">일정 저장</button>
    </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
